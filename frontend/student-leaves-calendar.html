<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Calendar - SmartFace</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-layout">
        <nav class="sidebar">
            <div class="logo-container">
                <img src="/assets/logo.png" alt="SmartFace logo" class="logo-img" />
                <div class="logo-text">
                    <h2>SmartFace</h2>
                    <p>Student Panel</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="/student-dashboard" class="nav-item">My Attendance</a></li>
                <li><a href="/my-leaves" class="nav-item">My Leave Requests</a></li>
                <li><a href="/student-leaves-calendar" class="nav-item active">Leave Calendar</a></li>
            </ul>
            <a href="#" class="nav-item logout-btn" id="logoutBtn">Logout</a>
        </nav>

        <main class="main-content">
            <div class="header">
                <h1>Leave Calendar</h1>
                <p>View approved leaves (school calendar)</p>
            </div>

            <div class="glass-card" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <button class="btn" onclick="previousMonth()">← Previous</button>
                    <h2 id="calendarTitle" style="margin: 0;"></h2>
                    <button class="btn" onclick="nextMonth()">Next →</button>
                </div>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: rgba(255,255,255,0.05);">
                                <th style="padding: 0.75rem;">Sun</th>
                                <th style="padding: 0.75rem;">Mon</th>
                                <th style="padding: 0.75rem;">Tue</th>
                                <th style="padding: 0.75rem;">Wed</th>
                                <th style="padding: 0.75rem;">Thu</th>
                                <th style="padding: 0.75rem;">Fri</th>
                                <th style="padding: 0.75rem;">Sat</th>
                            </tr>
                        </thead>
                        <tbody id="calendarBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="dayModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000;">
        <div class="glass-card" style="max-width: 400px; width: 90%; padding: 1.5rem;">
            <h3 id="dayModalTitle"></h3>
            <div id="dayModalContent" style="margin: 1rem 0;"></div>
            <button class="btn btn-primary" onclick="closeDayModal()" style="width: 100%;">Close</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const script = document.createElement('script');
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.async = true;
        script.crossOrigin = 'anonymous';

        let allLeaves = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        script.addEventListener('load', async function () {
            await window.Clerk.load();
            if (!window.Clerk.user) {
                window.location.href = '/';
                return;
            }
            const user = await requirePageRole('student');
            if (!user) return;
            loadLeaves();
        });
        document.body.appendChild(script);

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        async function loadLeaves() {
            const res = await apiFetch('/api/leaves/calendar');
            allLeaves = await res.json();
            renderCalendar();
        }

        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            document.getElementById('calendarTitle').textContent =
                new Date(currentYear, currentMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const calendarBody = document.getElementById('calendarBody');
            calendarBody.innerHTML = '';

            let date = 1;
            for (let week = 0; week < 6 && date <= lastDay.getDate(); week++) {
                const row = calendarBody.insertRow();
                for (let day = 0; day < 7; day++) {
                    const cell = row.insertCell();
                    if ((week === 0 && day < firstDay.getDay()) || date > lastDay.getDate()) {
                        cell.style.padding = '0.75rem';
                        continue;
                    }
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                    const leavesOnDate = allLeaves.filter(l => dateStr >= l.startDate && dateStr <= l.endDate);
                    cell.innerHTML = `<strong>${date}</strong>`;
                    if (leavesOnDate.length > 0) {
                        cell.innerHTML += `<div style="font-size:0.75rem;color:#3B82F6;">📋 ${leavesOnDate.length}</div>`;
                        cell.style.background = 'rgba(59,130,246,0.1)';
                        cell.style.cursor = 'pointer';
                        cell.onclick = () => showDayDetails(dateStr, leavesOnDate);
                    }
                    cell.style.padding = '0.75rem';
                    cell.style.verticalAlign = 'top';
                    date++;
                }
            }
        }

        function previousMonth() {
            if (currentMonth === 0) { currentMonth = 11; currentYear--; }
            else currentMonth--;
            renderCalendar();
        }

        function nextMonth() {
            if (currentMonth === 11) { currentMonth = 0; currentYear++; }
            else currentMonth++;
            renderCalendar();
        }

        function showDayDetails(dateStr, leaves) {
            document.getElementById('dayModal').style.display = 'flex';
            document.getElementById('dayModalTitle').textContent = new Date(dateStr).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('dayModalContent').innerHTML = leaves.map(l =>
                `<div style="padding:0.75rem;margin-bottom:0.5rem;background:rgba(59,130,246,0.08);border-radius:6px;">
                    <strong>${l.name}</strong> — ${l.leaveType}<br>
                    <span style="color:var(--text-muted);font-size:0.9rem;">${l.startDate} to ${l.endDate}</span>
                </div>`
            ).join('');
        }

        function closeDayModal() {
            document.getElementById('dayModal').style.display = 'none';
        }
    </script>
</body>

</html>
