<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves - SmartFace</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-container">
                <img src="/assets/logo.png" alt="SmartFace logo" class="logo-img" />
                <div class="logo-text">
                    <h2>SmartFace</h2>
                    <p>Student Panel</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="/student-dashboard" class="nav-item">My Attendance</a></li>
                <li><a href="/my-leaves" class="nav-item active">My Leave Requests</a></li>
                <li><a href="/student-leaves-calendar" class="nav-item">Leave Calendar</a></li>
            </ul>
            <a href="#" class="nav-item logout-btn" id="logoutBtn">Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>Leave Management</h1>
                <p>Apply for leaves and view your leave history</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; margin-bottom: 2rem;">
                <!-- Apply Leave Form -->
                <div class="glass-card">
                    <h3>📝 Apply for Leave</h3>
                    <form id="leaveForm" style="display: flex; flex-direction: column; gap: 1rem;">
                        <div class="form-group">
                            <label>Leave Type</label>
                            <select id="leaveType" required style="padding: 0.7rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); border-radius: 8px; color: var(--text-primary);">
                                <option value="casual">Casual Leave</option>
                                <option value="sick">Sick Leave</option>
                                <option value="familyEmergency">Family Emergency</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="startDate" required style="padding: 0.7rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); border-radius: 8px; color: var(--text-primary);">
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" id="endDate" required style="padding: 0.7rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); border-radius: 8px; color: var(--text-primary);">
                        </div>
                        <div class="form-group">
                            <label>Reason</label>
                            <textarea id="reason" rows="3" required placeholder="Please provide reason..." style="padding: 0.7rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); border-radius: 8px; color: var(--text-primary);"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Application</button>
                    </form>
                </div>

                <!-- Leave Statistics & History -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Statistics -->
                    <div class="glass-card">
                        <h3>📊 Leave Statistics (2026)</h3>
                        <div id="leaveStats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem;">
                            <div style="padding: 1rem; background: rgba(59, 130, 246, 0.1); border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: 600; color: #3B82F6;">0</div>
                                <div style="color: var(--text-muted); font-size: 0.9rem;">Sick Leave</div>
                            </div>
                            <div style="padding: 1rem; background: rgba(34, 197, 94, 0.1); border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: 600; color: #22C55E;">0</div>
                                <div style="color: var(--text-muted); font-size: 0.9rem;">Casual Leave</div>
                            </div>
                            <div style="padding: 1rem; background: rgba(240, 153, 75, 0.1); border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: 600; color: #F59E0B;">0</div>
                                <div style="color: var(--text-muted); font-size: 0.9rem;">Pending</div>
                            </div>
                        </div>
                    </div>

                    <!-- Leave History -->
                    <div class="glass-card">
                        <h3>📋 Leave History</h3>
                        <div id="leaveHistory" style="max-height: 400px; overflow-y: auto;">
                            <div style="text-align: center; color: var(--text-muted); padding: 2rem;">
                                Loading...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const script = document.createElement('script');
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.async = true;
        script.crossOrigin = 'anonymous';

        script.addEventListener('load', async function () {
            await window.Clerk.load({
                signInUrl: 'https://composed-wahoo-82.accounts.dev/sign-in',
                signUpUrl: 'https://composed-wahoo-82.accounts.dev/sign-up'
            });
            if (!window.Clerk.user) {
                window.Clerk.redirectToSignIn({ returnBackUrl: window.location.href });
            } else {
                const user = await requirePageRole('student');
                if (user) {
                    studentId = user.studentId;
                    studentName = user.name;
                    loadLeaveStats();
                    loadLeaveHistory();
                }
            }
        });
        document.body.appendChild(script);

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        let studentId = null;
        let studentName = null;

        // Load leave statistics
        async function loadLeaveStats() {
            if (!studentId) return;
            try {
                const res = await apiFetch(`/api/leaves/stats/${studentId}`);
                const data = await res.json();

                const statsHtml = data.approvedLeaves.map(leave => {
                    const typeLabel = {
                        'sick': 'Sick Leave',
                        'casual': 'Casual Leave',
                        'familyEmergency': 'Family Emergency',
                        'other': 'Other Leave'
                    }[leave._id] || leave._id;

                    return `
                        <div style="padding: 1rem; background: rgba(100, 150, 200, 0.1); border-radius: 8px; text-align: center;">
                            <div style="font-size: 24px; font-weight: 600; color: #3B82F6;">${leave.totalDays}</div>
                            <div style="font-size: 0.85rem; color: var(--text-muted);">Days (${leave.count} req)</div>
                            <div style="font-size: 0.9rem; color: var(--text-primary); margin-top: 0.3rem;">${typeLabel}</div>
                        </div>
                    `;
                }).join('');

                const statsContainer = document.getElementById('leaveStats');
                if (data.approvedLeaves.length > 0) {
                    statsContainer.innerHTML = statsHtml;
                } else {
                    statsContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">No approved leaves yet</div>';
                }
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

        // Load leave history
        async function loadLeaveHistory() {
            if (!studentId) return;
            try {
                const res = await apiFetch(`/api/leaves/my`);
                const leaves = await res.json();

                if (leaves.length === 0) {
                    document.getElementById('leaveHistory').innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">No leave records yet</div>';
                    return;
                }

                const historyHtml = leaves.map(leave => {
                    const statusColor = {
                        'pending': '#F59E0B',
                        'approved': '#10B981',
                        'rejected': '#EF4444'
                    }[leave.status];

                    const statusEmoji = {
                        'pending': '⏳',
                        'approved': '✅',
                        'rejected': '❌'
                    }[leave.status];

                    return `
                        <div style="padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: 500; margin-bottom: 0.3rem;">
                                    ${leave.leaveType === 'sick' ? '🤒 Sick Leave' : 
                                      leave.leaveType === 'familyEmergency' ? '👨‍👩‍👧 Family Emergency' : 
                                      leave.leaveType === 'casual' ? '😊 Casual Leave' : '📝 Other'}
                                </div>
                                <div style="font-size: 0.9rem; color: var(--text-muted);">
                                    ${leave.startDate} to ${leave.endDate} (${leave.numberOfDays} days)
                                </div>
                                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.2rem;">
                                    Reason: ${leave.reason}
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <div style="color: ${statusColor}; font-weight: 500; margin-bottom: 0.3rem;">
                                    ${statusEmoji} ${leave.status.toUpperCase()}
                                </div>
                                <div style="font-size: 0.85rem; color: var(--text-muted);">
                                    ${new Date(leave.appliedDate).toLocaleDateString()}
                                </div>
                                ${leave.status === 'pending' ? `
                                    <button class="btn" style="background: rgba(239, 68, 68, 0.2); color: #EF4444; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; margin-top: 0.5rem; font-size: 0.85rem;" onclick="cancelLeave('${leave._id}')">Cancel</button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('leaveHistory').innerHTML = historyHtml;
            } catch (err) {
                console.error('Error loading history:', err);
                document.getElementById('leaveHistory').innerHTML = '<div style="color: #EF4444; text-align: center; padding: 1rem;">Error loading leave history</div>';
            }
        }

        // Apply for leave
        document.getElementById('leaveForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!studentId) {
                showToast('Please complete your profile first', 'error');
                return;
            }

            const leaveType = document.getElementById('leaveType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const reason = document.getElementById('reason').value;

            try {
                const res = await apiFetch('/api/leaves', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentId,
                        name: studentName,
                        startDate,
                        endDate,
                        reason,
                        leaveType
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast(`✅ Leave application submitted! (${data.leave.numberOfDays} days)`, 'success');
                    document.getElementById('leaveForm').reset();
                    loadLeaveHistory();
                    loadLeaveStats();
                } else if (res.status === 409) {
                    showToast(`⏳ You already have a leave request for this period`, 'warning');
                } else {
                    showToast(data.message || 'Error applying for leave', 'error');
                }
            } catch (err) {
                console.error('Error:', err);
                showToast('Failed to submit application', 'error');
            }
        });

        // Cancel leave
        async function cancelLeave(leaveId) {
            if (!confirm('Are you sure you want to cancel this leave request?')) return;

            try {
                const res = await apiFetch(`/api/leaves/${leaveId}/cancel`, {
                    method: 'PUT'
                });

                const data = await res.json();

                if (res.ok) {
                    showToast('✅ Leave cancelled successfully', 'success');
                    loadLeaveHistory();
                } else {
                    showToast(data.message || 'Error cancelling leave', 'error');
                }
            } catch (err) {
                console.error('Error:', err);
                showToast('Failed to cancel leave', 'error');
            }
        }

    </script>
</body>

</html>
