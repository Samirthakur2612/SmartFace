<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Student ID - SmartFace</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="background: radial-gradient(circle at center, var(--bg-dark), #000); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-card" style="max-width: 440px; width: 90%; padding: 2.5rem;">
        <img src="/assets/logo.png" alt="SmartFace" style="width: 50px; display: block; margin: 0 auto 1rem;">
        <h1 style="text-align: center; margin-bottom: 0.5rem;">Link Your Student ID</h1>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 1.5rem;">
            Enter the Student ID assigned when your face was registered. Only you can see your attendance after linking.
        </p>
        <form id="linkForm">
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="studentIdInput" required placeholder="e.g. CS2023001"
                    style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: inherit;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Link Account</button>
        </form>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem; text-align: center;">
            Use the same Gmail your admin registered for you, or ask admin to add your email when registering.
        </p>
        <a href="#" id="logoutBtn" style="display: block; text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">Logout</a>
    </div>

    <script src="js/app.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const script = document.createElement('script');
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.async = true;
        script.crossOrigin = 'anonymous';

        script.addEventListener('load', async function () {
            await window.Clerk.load();
            if (!window.Clerk.user) {
                navigateTo('/');
                return;
            }
            const user = await requirePageRole('student');
            if (user?.studentId) {
                navigateTo('/student-dashboard');
            }
        });
        document.body.appendChild(script);

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        document.getElementById('linkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('studentIdInput').value.trim();
            try {
                const res = await apiFetch('/api/users/link-student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Account linked!', 'success');
                    setTimeout(() => window.location.href = '/student-dashboard', 800);
                } else {
                    showToast(data.message || 'Could not link', 'error');
                }
            } catch (err) {
                showToast('Failed to link account', 'error');
            }
        });
    </script>
</body>

</html>
