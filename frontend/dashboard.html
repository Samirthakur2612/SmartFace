<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFace</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-container">
                <img src="/assets/logo.png" alt="SmartFace logo" class="logo-img" />
                <div class="logo-text">
                    <h2>SmartFace</h2>
                    <p>Admin Panel</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="/dashboard" class="nav-item active">View Attendance</a></li>
                <li><a href="/attendance-records" class="nav-item">Attendance Records</a></li>
                <li><a href="/attendance-scan" class="nav-item">Attendance Scan</a></li>
                <li><a href="/register" class="nav-item">Register Student</a></li>
                <li><a href="/students" class="nav-item">Manage Students</a></li>
                <li><a href="/add-class" class="nav-item">➕ Add Class</a></li>
                <li><a href="/class-management" class="nav-item">📅 Manage Classes</a></li>
                <li><a href="/leave-management" class="nav-item">Leave Requests</a></li>
                <li><a href="/leaves-calendar" class="nav-item">Leave Calendar</a></li>
                <li><a href="/access-requests" class="nav-item">🔐 Access Requests</a></li>
            </ul>
            <a href="#" class="nav-item logout-btn" id="logoutBtn">Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>Daily Attendance List</h1>
                <button class="btn btn-success" id="exportBtn">Export to CSV</button>
            </div>

            <div class="glass-card">
                <div class="filter-bar">
                    <input type="date" id="dateFilter" class="form-control">
                    <input type="text" id="searchFilter" placeholder="Search by name or ID..." class="form-control">
                    <button class="btn btn-primary" id="filterBtn">Filter</button>
                    <button class="btn" id="resetBtn">Reset</button>
                </div>

                <div class="data-table-container">
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Student ID</th>
                                <th>Name</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/particles.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const script = document.createElement('script');
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.async = true;
        script.crossOrigin = 'anonymous';

        script.addEventListener('load', async function () {
            console.log('[DEBUG Dashboard] Clerk Script Loaded. Calling Clerk.load()');
            await window.Clerk.load({
                signInUrl: 'https://composed-wahoo-82.accounts.dev/sign-in',
                signUpUrl: 'https://composed-wahoo-82.accounts.dev/sign-up'
            });
            console.log('[DEBUG Dashboard] Clerk.load() finished.');
            console.log('[DEBUG Dashboard] User:', window.Clerk.user);
            console.log('[DEBUG Dashboard] Session:', window.Clerk.session);

            if (!window.Clerk.user) {
                window.Clerk.redirectToSignIn({ returnBackUrl: window.location.href });
            } else {
                const user = await requirePageRole('admin');
                if (user) loadAttendance();
            }
        });
        document.body.appendChild(script);

        document.addEventListener('DOMContentLoaded', () => {

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });

            document.getElementById('exportBtn').addEventListener('click', async () => {
                try {
                    const res = await apiFetch('/api/attendance/export');
                    if (!res.ok) {
                        showToast('Failed to export CSV', 'error');
                        return;
                    }

                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'attendance_report.csv';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                } catch (_err) {
                    showToast('Failed to export CSV', 'error');
                }
            });

            document.getElementById('filterBtn').addEventListener('click', () => {
                const date = document.getElementById('dateFilter').value;
                loadAttendance(date);
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                document.getElementById('dateFilter').value = '';
                document.getElementById('searchFilter').value = '';
                loadAttendance();
            });

            document.getElementById('searchFilter').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const rows = document.querySelectorAll('#attendanceTable tbody tr');

                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    if (text.includes(term)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });
        });

        async function loadAttendance(date = '') {
            try {
                let url = '/api/attendance';
                if (date) url += `?date=${date}`;

                const res = await apiFetch(url);
                const data = await res.json();

                const tbody = document.querySelector('#attendanceTable tbody');
                tbody.innerHTML = '';

                data.forEach(record => {
                    const tr = document.createElement('tr');
                    const timeStr = new Date(record.timestamp).toLocaleString();
                    tr.innerHTML = `
                        <td>${timeStr}</td>
                        <td>${record.studentId}</td>
                        <td>${record.name}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                showToast('Failed to load attendance records', 'error');
            }
        }
    </script>
</body>

</html>
