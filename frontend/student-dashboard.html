<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - SmartFace</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-layout">
        <nav class="sidebar">
            <div class="logo-container">
                <img src="/assets/logo.png" alt="SmartFace logo" class="logo-img" />
                <div class="logo-text">
                    <h2>SmartFace</h2>
                    <p>Student Panel</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="/student-dashboard" class="nav-item active">My Attendance</a></li>
                <li><a href="/my-leaves" class="nav-item">My Leave Requests</a></li>
                <li><a href="/student-leaves-calendar" class="nav-item">Leave Calendar</a></li>
            </ul>
            <a href="#" class="nav-item logout-btn" id="logoutBtn">Logout</a>
        </nav>

        <main class="main-content">
            <div class="header">
                <h1>My Attendance</h1>
                <p id="studentWelcome">Loading your records...</p>
            </div>

            <div class="glass-card">
                <div class="filter-bar">
                    <input type="date" id="dateFilter" class="form-control">
                    <button class="btn btn-primary" id="filterBtn">Filter</button>
                    <button class="btn" id="resetBtn">Reset</button>
                </div>
                <div class="data-table-container">
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Class</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const script = document.createElement('script');
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.async = true;
        script.crossOrigin = 'anonymous';

        script.addEventListener('load', async function () {
            await window.Clerk.load();
            if (!window.Clerk.user) {
                navigateTo('/');
                return;
            }
            const user = await requirePageRole('student');
            if (!user) return;
            document.getElementById('studentWelcome').textContent =
                `Signed in as ${user.name} (${user.studentId})`;
            loadAttendance();
        });
        document.body.appendChild(script);

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        document.getElementById('filterBtn').addEventListener('click', () => {
            loadAttendance(document.getElementById('dateFilter').value);
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('dateFilter').value = '';
            loadAttendance();
        });

        async function loadAttendance(date = '') {
            try {
                let url = '/api/attendance';
                if (date) url += `?date=${date}`;
                const res = await apiFetch(url);
                const data = await res.json();
                const tbody = document.querySelector('#attendanceTable tbody');
                tbody.innerHTML = '';

                if (!res.ok) {
                    showToast(data.message || 'Failed to load', 'error');
                    return;
                }

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">No attendance records yet</td></tr>';
                    return;
                }

                data.forEach(record => {
                    const tr = document.createElement('tr');
                    const timeStr = new Date(record.timestamp).toLocaleString();
                    const status = record.status || 'present';
                    tr.innerHTML = `
                        <td>${timeStr}</td>
                        <td>${record.className || '—'}</td>
                        <td>${status}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                showToast('Failed to load attendance', 'error');
            }
        }
    </script>
</body>

</html>
