<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFace</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-container">
                <img src="/assets/logo.png" alt="SmartFace logo" class="logo-img" />
                <div class="logo-text">
                    <h2>SmartFace</h2>
                    <p>Admin Panel</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="/dashboard" class="nav-item">View Attendance</a></li>
                <li><a href="/attendance-records" class="nav-item">Attendance Records</a></li>
                <li><a href="/attendance-scan" class="nav-item">Attendance Scan</a></li>
                <li><a href="/register" class="nav-item">Register Student</a></li>
                <li><a href="/students" class="nav-item active">Manage Students</a></li>
                <li><a href="/add-class" class="nav-item">➕ Add Class</a></li>
                <li><a href="/class-management" class="nav-item">📅 Manage Classes</a></li>
                <li><a href="/leave-management" class="nav-item">Leave Requests</a></li>
                <li><a href="/leaves-calendar" class="nav-item">Leave Calendar</a></li>
            </ul>
            <a href="#" class="nav-item logout-btn" id="logoutBtn">Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>Registered Students</h1>
            </div>

            <div class="glass-card">
                <div class="filter-bar">
                    <input type="text" id="searchStudents" placeholder="Search by name or ID..." class="form-control">
                </div>

                <div class="data-table-container">
                    <table id="studentsTable">
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Name</th>
                                <th>Registered At</th>
                                <th style="width: 120px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/particles.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const script = document.createElement('script');
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.async = true;
        script.crossOrigin = 'anonymous';

        script.addEventListener('load', async function () {
            await window.Clerk.load({
                signInUrl: 'https://composed-wahoo-82.accounts.dev/sign-in',
                signUpUrl: 'https://composed-wahoo-82.accounts.dev/sign-up'
            });
            if (!window.Clerk.user) {
                window.Clerk.redirectToSignIn({ returnBackUrl: window.location.href });
            } else {
                const user = await requirePageRole('admin');
                if (user) loadStudents();
            }
        });
        document.body.appendChild(script);

        let allStudents = [];

        document.addEventListener('DOMContentLoaded', () => {

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });

            document.getElementById('searchStudents').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                renderStudents(allStudents.filter(s => {
                    return s.studentId.toLowerCase().includes(term) ||
                        s.name.toLowerCase().includes(term);
                }));
            });
        });

        async function loadStudents() {
            try {
                const res = await apiFetch('/api/students/all');
                const data = await res.json();
                allStudents = data;
                renderStudents(allStudents);
            } catch (err) {
                console.error(err);
                showToast('Failed to load students', 'error');
            }
        }

        function renderStudents(list) {
            const tbody = document.querySelector('#studentsTable tbody');
            tbody.innerHTML = '';

            list.forEach(student => {
                const tr = document.createElement('tr');
                const created = student.createdAt ? new Date(student.createdAt).toLocaleString() : '-';
                tr.innerHTML = `
                    <td>${student.studentId}</td>
                    <td>${student.name}</td>
                    <td>${created}</td>
                    <td>
                        <button class="btn btn-sm" data-action="delete" data-id="${student.studentId}">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            tbody.querySelectorAll('button[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    if (!confirm(`Delete student ${id}?`)) return;
                    try {
                        const res = await apiFetch(`/api/students/${encodeURIComponent(id)}`, {
                            method: 'DELETE'
                        });
                        const data = await res.json().catch(() => ({}));
                        if (res.ok) {
                            showToast('Student deleted');
                            allStudents = allStudents.filter(s => s.studentId !== id);
                            renderStudents(allStudents);
                        } else {
                            showToast(data.message || 'Failed to delete', 'error');
                        }
                    } catch (err) {
                        console.error(err);
                        showToast('Failed to delete', 'error');
                    }
                });
            });
        }
    </script>
</body>

</html>
