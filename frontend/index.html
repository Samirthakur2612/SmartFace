<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFace - Login</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.login-bg {
            position: relative;
            min-height: 100vh;
        }

        .login-header,
        .login-container {
            position: relative;
            z-index: 100;
            pointer-events: auto;
        }

        .login-container {
            pointer-events: auto;
        }

        .role-login-picker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 1rem;
        }

        .role-login-btn {
            cursor: pointer;
            padding: 1rem;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            text-align: center;
            color: inherit;
            font: inherit;
            width: 100%;
            pointer-events: auto;
        }

        .role-login-btn.active {
            border-color: var(--primary-light);
            background: rgba(16, 185, 129, 0.15);
        }

        .role-login-btn.admin.active {
            border-color: #3B82F6;
            background: rgba(59, 130, 246, 0.15);
        }

        .role-login-btn h3 { margin: 0.35rem 0 0.25rem; font-size: 1rem; }
        .role-login-btn p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }

        #step2-section { display: none; width: 100%; }
        #step2-section.visible { display: block; }

        #already-signed-in {
            display: none;
            width: 100%;
            text-align: center;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .google-auth-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            pointer-events: auto;
        }

        .btn-google {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            pointer-events: auto;
            position: relative;
            z-index: 101;
        }

        .btn-google-signin {
            background: linear-gradient(135deg, #10B981, #059669);
            color: #fff;
        }

        .btn-google-signup {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #authStatus {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 0.5rem;
        }

        .step-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body class="login-bg">
    <header class="login-header">
        <img src="/assets/logo.png" alt="SmartFace" class="logo-img" />
        <h1>SmartFace</h1>
    </header>

    <div class="login-container glass-card"
        style="display:flex;flex-direction:column;align-items:center;max-width:480px;width:90%;padding:2rem;">

        <div id="already-signed-in">
            <p style="margin:0 0 0.5rem;color:var(--text-muted);">Already signed in with Google</p>
            <p id="signedInEmail" style="color:var(--primary-light);margin-bottom:0.75rem;font-size:0.9rem;"></p>
            <p id="continueHint" style="font-size:0.85rem;color:#F59E0B;margin-bottom:0.75rem;display:none;">
                ⚠ Pick Student or Admin below before Continue
            </p>
            <button type="button" class="btn btn-primary" id="btnContinue" style="width:100%;margin-bottom:0.5rem;cursor:pointer;">
                Continue to app →
            </button>
            <button type="button" class="btn" id="btnSignOutDifferent" style="width:100%;cursor:pointer;">
                Sign out (use another Gmail)
            </button>
            <hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:1.25rem 0;" />
        </div>

        <div id="login-flow">
            <p class="step-badge">Step 1 — Choose Student or Admin</p>
            <div class="role-login-picker">
                <button type="button" class="role-login-btn" id="roleStudent">
                    <div style="font-size:1.5rem;">👥</div>
                    <h3>Student</h3>
                    <p>Attendance & leaves</p>
                </button>
                <button type="button" class="role-login-btn admin" id="roleAdmin">
                    <div style="font-size:1.5rem;">⚙️</div>
                    <h3>Admin</h3>
                    <p>Manage records</p>
                </button>
            </div>
            <p id="roleHint" style="color:var(--text-muted);font-size:0.9rem;text-align:center;">
                ↑ Click Student or Admin first
            </p>

            <div id="step2-section">
                <p class="step-badge" style="margin-top:1rem;">Step 2 — Google sign in</p>
                <p id="selectedRoleLabel" style="text-align:center;color:var(--primary-light);font-size:0.9rem;"></p>
                <div class="google-auth-actions" style="margin-top:0.75rem;">
                    <button type="button" class="btn-google btn-google-signin" id="btnSignIn">
                        Sign in with Google
                    </button>
                    <button type="button" class="btn-google btn-google-signup" id="btnSignUp">
                        New user? Register with Google
                    </button>
                </div>
                <p id="authStatus">Loading sign-in…</p>
            </div>
        </div>

        <p style="color:var(--text-muted);font-size:0.8rem;text-align:center;margin-top:1rem;">
            New users need approval from <strong>samirthakur829@gmail.com</strong>.
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        const PUBLISHABLE_KEY = 'pk_test_Y29tcG9zZWQtd2Fob28tODIuY2xlcmsuYWNjb3VudHMuZGV2JA';
        const CLERK_SIGN_IN_URL = 'https://composed-wahoo-82.accounts.dev/sign-in';
        const CLERK_SIGN_UP_URL = 'https://composed-wahoo-82.accounts.dev/sign-up';

        let clerkReady = false;

        const step2 = document.getElementById('step2-section');
        const authStatus = document.getElementById('authStatus');
        const btnSignIn = document.getElementById('btnSignIn');
        const btnSignUp = document.getElementById('btnSignUp');

        function setAuthStatus(msg) {
            if (authStatus) authStatus.textContent = msg;
        }

        function onRolePicked(role) {
            sessionStorage.setItem('loginRole', role);
            setLoginRole(role);
            step2.classList.add('visible');
            document.getElementById('roleHint').style.display = 'none';
            const hint = document.getElementById('continueHint');
            if (hint) hint.style.display = 'none';
            setAuthStatus(clerkReady ? 'Ready — click a button below' : 'Loading Google sign-in…');
        }

        function updateSignedInPanel() {
            const panel = document.getElementById('already-signed-in');
            if (!window.Clerk?.user) {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            const info = getClerkUserInfo();
            if (info) {
                document.getElementById('signedInEmail').textContent = info.email;
            }
            const ch = document.getElementById('continueHint');
            if (ch) ch.style.display = sessionStorage.getItem('loginRole') ? 'none' : 'block';
        }

        async function openClerkAuth(mode) {
            if (!sessionStorage.getItem('loginRole')) {
                alert('Please click Student or Admin first (Step 1).');
                return;
            }

            const returnUrl = encodeURIComponent(window.location.origin + '/');

            if (!clerkReady || !window.Clerk) {
                const url = mode === 'signUp' ? CLERK_SIGN_UP_URL : CLERK_SIGN_IN_URL;
                window.location.href = url + '?redirect_url=' + returnUrl;
                return;
            }

            try {
                const opts = {
                    afterSignInUrl: window.location.href,
                    afterSignUpUrl: window.location.href,
                    redirectUrl: window.location.href
                };

                if (mode === 'signUp') {
                    if (typeof window.Clerk.openSignUp === 'function') {
                        window.Clerk.openSignUp(opts);
                    } else {
                        window.location.href = CLERK_SIGN_UP_URL + '?redirect_url=' + returnUrl;
                    }
                } else if (typeof window.Clerk.openSignIn === 'function') {
                    window.Clerk.openSignIn(opts);
                } else {
                    await window.Clerk.redirectToSignIn({
                        signInForceRedirectUrl: window.location.href,
                        signUpForceRedirectUrl: window.location.href
                    });
                }
            } catch (err) {
                console.error('Clerk auth error:', err);
                const url = mode === 'signUp' ? CLERK_SIGN_UP_URL : CLERK_SIGN_IN_URL;
                window.location.href = url + '?redirect_url=' + returnUrl;
            }
        }

        document.getElementById('roleStudent').addEventListener('click', () => onRolePicked('student'));
        document.getElementById('roleAdmin').addEventListener('click', () => onRolePicked('admin'));

        btnSignIn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            openClerkAuth('signIn');
        });

        btnSignUp.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            openClerkAuth('signUp');
        });

        document.getElementById('btnContinue').addEventListener('click', () => finishLoginAndRedirect());
        document.getElementById('btnSignOutDifferent').addEventListener('click', () => logout());

        if (sessionStorage.getItem('loginRole')) {
            onRolePicked(sessionStorage.getItem('loginRole'));
        }

        const script = document.createElement('script');
        script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
        script.setAttribute('crossorigin', 'anonymous');
        script.async = true;
        script.src = 'https://composed-wahoo-82.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';

        script.onload = async () => {
            try {
                if (!window.Clerk) {
                    setAuthStatus('Clerk failed — use buttons (opens sign-in page)');
                    return;
                }
                await window.Clerk.load();
                clerkReady = true;
                setAuthStatus('Ready — click Sign in or Register');

                updateSignedInPanel();

                window.Clerk.addListener(({ user }) => {
                    updateSignedInPanel();
                });
            } catch (err) {
                console.error(err);
                clerkReady = false;
                setAuthStatus('Clerk error — buttons will open sign-in in browser');
            }
        };

        script.onerror = () => {
            clerkReady = false;
            setAuthStatus('Offline? Buttons still open Clerk sign-in page');
        };

        document.head.appendChild(script);
    </script>
</body>

</html>
